# Copy to ~/.remote-development-mcp
#
# Read once at startup. Change anything here and restart the server.

# Keep this on the loopback interface. This server does not authenticate by
# default, so the only things that should be able to reach this port are the
# reverse proxy in front of it and you.
bind_addr: 127.0.0.1:8123

# Authentication is off by default: this server is meant to sit behind a reverse
# proxy that terminates auth. Uncomment only if the port is reachable by
# something other than that proxy.
# auth_token: "generate-a-long-random-string"

# Default policy, overridable per project below.
# allowlist  — only the binaries listed may be started
# passthrough — any binary may be started, still confined to the repository root
command_mode: allowlist

# Kept small on purpose. Excluded from the default:
#   - sh/bash — a shell here is passthrough in one step
#   - cat/ls/mkdir/mv — their arguments are not path-confined, so they could read
#     or write outside the repo; the read_file/list_dir/write_file/move_path
#     tools cover them and stay inside the root
#   - rustup — `rustup run` executes any binary
# Add more here if you need them, or use command_mode: passthrough.
command_allowlist:
  - cargo
  - rustc
  - git
  - rg

# Per project — one can occupy all of its own slots without affecting the
# others. Counted on the project, not on the endpoint, so connecting through a
# second url does not hand out a second set of slots.
max_concurrent_jobs: 4

# Applied to jobs that do not ask for a timeout of their own.
default_timeout_sec: 3600

# Per-stream cap on one job's log. Past it the job keeps running, but its log
# stops growing and is marked as truncated.
max_log_bytes: 16777216

logs_path: ~/.remote-development-mcp-logs

# Token for the create_release tool (GitHub REST API). Without it that tool
# refuses; everything else works regardless. Needs `contents: write` on the
# repositories being released.
# github_token: "ghp_..."

# The audit journal is off by default. Set a path to turn it on — every command
# start, finish and refusal is then appended as one JSON line.
# audit_log_path: ~/.remote-development-mcp-audit.log

# Every repository this machine can serve, described once. Adding one here is
# the whole job — no client-side registration, because it shows up under the
# endpoints that already list it.
#
# The id is not decoration: it names the log folder, prefixes every job id, and
# is what the `project` argument of a tool call has to match. Letters, digits,
# '.', '_' and '-' only.
projects:
  - id: remote-development-mcp
    root: ~/RustProjects/my-jet-tools/remote-development-mcp
    description: "The MCP server itself."

  - id: my-ssh
    root: ~/RustProjects/my-jet-tools/my-ssh

  # A project can loosen or tighten the defaults on its own.
  - id: scratch
    root: ~/RustProjects/scratch
    description: "Throwaway experiments."
    command_mode: passthrough
    allow_delete: true

# The urls to serve. An endpoint is a *view* over projects, not a project of its
# own — which is what lets one connection reach several repositories while the
# tool schemas are sent once instead of once per repository.
#
# Connect a client to https://<your-tunnel>/<url>. A project this endpoint does
# not list can not be reached through it, even by passing its id — so handing
# someone a url that maps to one project is how you give access to just that one.
endpoints:
  # Everything, for your own work: dependencies are reachable in the same
  # conversation, and the tool set is still loaded once.
  - url: /mcp
    description: "Everything on this machine."
    projects:
      - remote-development-mcp
      - my-ssh
      - scratch

  # A url onto a single project. `project` may be omitted on calls through it,
  # and nothing else on the machine is nameable.
  - url: /my-ssh
    projects:
      - my-ssh
